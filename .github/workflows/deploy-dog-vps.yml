name: Deploy dog.koxuan.com to VPS

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/deploy-dog-vps.yml'
      - 'README.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o BatchMode=yes "${{ secrets.VPS_DEPLOY_USER }}@${{ secrets.VPS_DEPLOY_HOST }}" 'echo SSH_OK'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard data
        env:
          DOGGO_BUILD_TRIGGER: vps-push
        run: python scripts/build_dashboard_data.py

      - name: Sync docs to VPS
        shell: bash
        env:
          VPS_DEPLOY_HOST: ${{ secrets.VPS_DEPLOY_HOST }}
          VPS_DEPLOY_USER: ${{ secrets.VPS_DEPLOY_USER }}
        run: |
          rsync -rlvz --delete --omit-dir-times --no-perms --no-owner --no-group \
            --exclude '.DS_Store' \
            ./docs/ "${VPS_DEPLOY_USER}@${VPS_DEPLOY_HOST}:/srv/www/dog.koxuan.com/current/"

      - name: Finalize deploy on VPS
        shell: bash
        env:
          VPS_DEPLOY_HOST: ${{ secrets.VPS_DEPLOY_HOST }}
          VPS_DEPLOY_USER: ${{ secrets.VPS_DEPLOY_USER }}
        run: |
          ssh "${VPS_DEPLOY_USER}@${VPS_DEPLOY_HOST}" '
            set -e
            find /srv/www/dog.koxuan.com/current -type d -exec chmod 755 {} \;
            find /srv/www/dog.koxuan.com/current -type f -exec chmod 644 {} \;
            sudo /usr/bin/caddy validate --config /etc/caddy/Caddyfile
            sudo /usr/bin/systemctl reload caddy
            curl -I https://dog.koxuan.com
          '
