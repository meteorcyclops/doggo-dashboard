<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>龍蝦指揮中心</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar pixel-panel">
        <div>
          <div class="brand">🦞 龍蝦指揮中心</div>
          <div class="sub">OpenClaw Pixel Command Dashboard</div>
        </div>
        <div class="status-group">
          <div class="status-pill online" id="gateway-pill">● ONLINE</div>
          <div class="clock" id="clock">--:--:--</div>
        </div>
      </header>

      <main class="layout">
        <section class="scene pixel-panel">
          <div class="pixel-room">
            <div class="monitor glow"></div>
            <div class="desk"></div>
            <div class="lobster">
              <div class="lobster-label" id="lobster-label">龍蝦在線，待命中</div>
            </div>
            <div class="server-stack">
              <div class="server"></div>
              <div class="server"></div>
              <div class="server"></div>
              <div class="server"></div>
            </div>
            <div class="task-bubble" id="task-bubble">監控中：載入中...</div>
          </div>

          <div class="scene-footer">
            <div class="mini-card pixel-panel inset">
              <div class="label">當前狀態</div>
              <div class="value" id="current-status">讀取中...</div>
            </div>
            <div class="mini-card pixel-panel inset">
              <div class="label">自動化任務</div>
              <div class="value" id="automation-count">讀取中...</div>
            </div>
            <div class="mini-card pixel-panel inset">
              <div class="label">今日主題</div>
              <div class="value" id="today-theme">市場、追蹤、提醒</div>
            </div>
          </div>
        </section>

        <aside class="sidebar">
          <section class="pixel-panel side-block">
            <div class="section-head">
              <h2>快速操作</h2>
              <button class="pixel-btn" id="refresh-btn">刷新資料</button>
            </div>
            <div class="button-grid">
              <a class="pixel-btn link-btn" href="http://127.0.0.1:18789/" target="_blank" rel="noreferrer">Open Dashboard</a>
              <a class="pixel-btn link-btn" href="http://127.0.0.1:18789/__openclaw__/canvas/" target="_blank" rel="noreferrer">Open Canvas</a>
              <button class="pixel-btn" data-copy="openclaw status --deep">複製 status 指令</button>
              <button class="pixel-btn" data-copy="openclaw logs --follow">複製 logs 指令</button>
            </div>
            <div class="hint" id="action-hint">可直接開啟本機頁面，或複製指令到 terminal。</div>
          </section>

          <section class="pixel-panel side-block">
            <h2>任務面板</h2>
            <ul class="task-list" id="task-list">
              <li><span>載入中...</span><b>...</b></li>
            </ul>
          </section>

          <section class="pixel-panel side-block">
            <h2>系統摘要</h2>
            <ul class="feature-list" id="summary-list">
              <li><span>Gateway</span><b>檢查中</b></li>
              <li><span>LINE</span><b>檢查中</b></li>
              <li><span>資料更新</span><b>尚未更新</b></li>
            </ul>
          </section>
        </aside>
      </main>
    </div>

    <script src="./ui.js"></script>
  </body>
</html>
