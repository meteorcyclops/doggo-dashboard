<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chat.koxuan.com</title>
    <link rel="stylesheet" href="/static/chat.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card chat-card">
        <div class="topbar">
          <div>
            <div class="kicker">PRIVATE CIRCLE</div>
            <h1>{{ room['title'] }}</h1>
            <p class="sub">{{ room['description'] }}</p>
            <p class="sub">你現在的匿名暱稱是 <b id="nickname">{{ nickname }}</b></p>
          </div>
          <div class="top-actions">
            <button id="refreshBtn" class="secondary">刷新</button>
            <form method="post" action="/logout">
              <button type="submit" class="ghost">離開</button>
            </form>
          </div>
        </div>
        <div class="notice">邀請制匿名聊天室，已啟用基本限流與字數限制。</div>
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <textarea id="body" maxlength="{{ max_message_length }}" placeholder="輸入訊息..." required></textarea>
          <div class="composer-row">
            <small id="hint">匿名顯示，請溫柔使用。</small>
            <button type="submit">送出</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/static/chat.js"></script>
  </body>
</html>
