<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chat.koxuan.com</title>
    <link rel="stylesheet" href="/static/chat.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card chat-card">
        <div class="topbar">
          <div>
            <div class="kicker">PRIVATE CIRCLE</div>
            <h1>{{ room['title'] }}</h1>
            <p class="sub">{{ room['description'] }}</p>
            <p class="sub">你現在的匿名暱稱是 <b id="nickname">{{ nickname }}</b></p>
          </div>
          <div class="top-actions">
            <button id="refreshBtn" class="secondary">刷新</button>
            <form method="post" action="/logout">
              <button type="submit" class="ghost">離開</button>
            </form>
          </div>
        </div>
        <div class="notice">匿名暱稱會隨機分配，可傳文字也可上傳原圖。手機上也能順順用。</div>
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer" enctype="multipart/form-data">
          <textarea id="body" name="body" maxlength="{{ max_message_length }}" placeholder="輸入訊息，或直接只傳圖片也可以"></textarea>
          <div class="upload-row">
            <label class="upload-label" for="imageInput">選擇照片</label>
            <input id="imageInput" name="image" type="file" accept="image/*" />
            <span id="fileName" class="file-name">尚未選擇照片</span>
          </div>
          <div id="imagePreview" class="image-preview hidden"></div>
          <div class="composer-row">
            <small id="hint">單則最多 {{ max_message_length }} 字，圖片上限 {{ max_upload_mb }}MB，原圖上傳。</small>
            <button type="submit">送出</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/static/chat.js"></script>
  </body>
</html>
